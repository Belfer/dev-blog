---
layout: default
---

<article>

  <h1>{{ page.title }}</h1>

  <p class="text-muted">
    {{ page.date | date: "%Y-%m-%d" }}
  </p>

  <div>
    {{ content }}
  </div>

  <hr>

  <div>
    Tags:
    {% for tag in page.tags %}
      <span class="badge bg-secondary">{{ tag }}</span>
    {% endfor %}
  </div>

</article>
