---
layout: default
---

<article class="post">

  <header class="mb-4">

    <h1 class="fw-bold">{{ page.title }}</h1>

    <div class="text-muted">
      {{ page.date | date: "%Y-%m-%d" }}
    </div>

    <div class="mt-2">
      {% for tag in page.tags %}
        <span class="badge bg-secondary me-1">{{ tag }}</span>
      {% endfor %}
    </div>

  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
