---
layout: default
---

<article class="post">

  <header class="mb-4">

    <h1 class="fw-bold">{{ page.title }}</h1>

    <div class="text-muted">
      {{ page.date | date: "%Y-%m-%d" }}
    </div>

    <div class="mt-2">
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | relative_url }}#{{ tag }}"
          class="badge me-1 tag-{{ tag }} text-decoration-none">
          {{ tag }}
        </a>
      {% endfor %}
    </div>

  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
