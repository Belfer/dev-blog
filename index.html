---
layout: default
title: Home
---

<div class="row">
  <div class="col-12">

    {% for post in site.posts %}

      <div class="card mb-3">
        <div class="card-body">

          <h4 class="mb-1">
            <a href="{{ post.url | relative_url }}">
              {{ post.title }}
            </a>
          </h4>

          <div class="text-muted small">
            {{ post.date | date: "%Y-%m-%d" }}
          </div>

          <p class="mt-2 mb-2">
            {{ post.excerpt }}
          </p>

          {% for tag in post.tags %}
            <span class="badge bg-dark border border-secondary me-1">
              {{ tag }}
            </span>
          {% endfor %}

        </div>
      </div>

    {% endfor %}

  </div>
</div>
