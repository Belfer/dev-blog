---
layout: default
title: Categories
---

<h1>Categories</h1>

{% assign sorted = site.categories | sort %}

{% for category in sorted %}

  <section class="category-block">

    <h2>{{ category[0] }}</h2>

    <ul class="blog-list">

      {% for post in category[1] %}

      <li class="blog-item">
        <a href="{{ post.url | relative_url }}">
          {{ post.title }}
        </a>

        <span class="mini-date">
          {{ post.date | date: "%Y-%m-%d" }}
        </span>
      </li>

      {% endfor %}

    </ul>

  </section>

{% endfor %}
